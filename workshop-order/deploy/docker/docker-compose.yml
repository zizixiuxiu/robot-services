name: workshop-order

services:
  workshop-order:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: workshop-order-8006
    ports:
      - "8006:8006"
    volumes:
      - ../../src:/app/src:ro
      - ../../data/output:/app/data/output
      - ../../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_DIR=/app/logs
      - WORKSHOP_MAX_WORKERS=1
      - WORKSHOP_DISCOUNT=0.85
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
