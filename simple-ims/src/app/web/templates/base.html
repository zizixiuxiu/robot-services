<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}平贴管理系统{% endblock %}</title>
    <style>
        :root {
            --bg: #f3f5f8;
            --panel: #ffffff;
            --panel-soft: #f8fafc;
            --line: #d9e0e7;
            --line-strong: #b7c3d1;
            --text: #213043;
            --muted: #6f7f90;
            --brand: #325d88;
            --brand-deep: #243f60;
            --accent: #c98d3a;
            --good: #3f7d4f;
            --bad: #b6574d;
            --shadow: 0 14px 28px rgba(22, 36, 54, 0.08);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(50, 93, 136, 0.10), transparent 26%),
                linear-gradient(180deg, #f6f8fb 0%, #edf1f5 100%);
        }

        a {
            color: var(--brand);
            text-decoration: none;
        }

        a:hover {
            color: var(--brand-deep);
        }

        .app-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 248px 1fr;
        }

        .sidebar {
            background: linear-gradient(180deg, #314b6a 0%, #24374f 100%);
            color: #ecf2f8;
            padding: 24px 18px;
            position: sticky;
            top: 0;
            height: 100vh;
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.06);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .brand-badge {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #d2a55f, #a96b29);
            color: #fffaf0;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.16);
        }

        .brand-copy strong {
            display: block;
            font-size: 18px;
            letter-spacing: 0.2px;
        }

        .brand-copy span {
            display: block;
            margin-top: 2px;
            color: rgba(236, 242, 248, 0.72);
            font-size: 12px;
        }

        .nav-group {
            margin-bottom: 22px;
        }

        .nav-label {
            padding: 0 10px;
            margin-bottom: 8px;
            color: rgba(236, 242, 248, 0.62);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 12px;
            border-radius: 10px;
            color: #eef3f8;
            margin-bottom: 4px;
            transition: background-color 120ms ease, transform 120ms ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.09);
            color: #ffffff;
            transform: translateX(2px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(201, 141, 58, 0.95), rgba(153, 92, 25, 0.95));
            color: #fffdf9;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.18);
        }

        .main-shell {
            min-width: 0;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 28px 16px;
        }

        .topbar-title h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .topbar-title p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .topbar-note {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(50, 93, 136, 0.08);
            color: var(--brand-deep);
            font-size: 13px;
            border: 1px solid rgba(50, 93, 136, 0.15);
        }

        .content-wrap {
            padding: 0 28px 32px;
        }

        .page-card {
            background: var(--panel);
            border: 1px solid rgba(183, 195, 209, 0.45);
            border-radius: 18px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 22px;
            background: linear-gradient(180deg, #fbfcfe 0%, #f3f6f9 100%);
            border-bottom: 1px solid var(--line);
        }

        .section-title h2,
        .section-title h3 {
            margin: 0;
            font-size: 20px;
        }

        .section-title p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .button,
        button,
        .button-secondary {
            appearance: none;
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        }

        .button,
        button {
            background: linear-gradient(135deg, var(--brand), var(--brand-deep));
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(36, 63, 96, 0.18);
        }

        .button-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #eef2f7;
            color: var(--text);
            border: 1px solid var(--line);
        }

        .button:hover,
        button:hover,
        .button-secondary:hover {
            transform: translateY(-1px);
        }

        .panel-body {
            padding: 22px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 14px;
        }

        .metric-card {
            background: linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
        }

        .metric-card span {
            display: block;
            color: var(--muted);
            font-size: 13px;
        }

        .metric-card strong {
            display: block;
            margin-top: 12px;
            font-size: 28px;
            color: var(--brand-deep);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead th {
            padding: 13px 14px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            color: var(--brand-deep);
            background: #edf3f8;
            border-bottom: 1px solid var(--line-strong);
        }

        .data-table tbody td {
            padding: 13px 14px;
            border-bottom: 1px solid #e8eef4;
            vertical-align: top;
            font-size: 14px;
        }

        .data-table tbody tr:hover {
            background: #fbfdff;
        }

        .cell-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-good {
            background: rgba(63, 125, 79, 0.12);
            color: var(--good);
        }

        .badge-bad {
            background: rgba(182, 87, 77, 0.12);
            color: var(--bad);
        }

        .badge-neutral {
            background: rgba(50, 93, 136, 0.10);
            color: var(--brand-deep);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px 20px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .form-field.full {
            grid-column: 1 / -1;
        }

        .form-field label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line-strong);
            background: #ffffff;
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
        }

        textarea {
            min-height: 104px;
            resize: vertical;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
        }

        .error-banner {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(182, 87, 77, 0.22);
            background: rgba(182, 87, 77, 0.08);
            color: var(--bad);
        }

        .split-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 18px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 180px 1fr;
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
        }

        .info-grid div {
            padding: 12px 14px;
            border-bottom: 1px solid #e9eef4;
        }

        .info-grid div:nth-last-child(-n+2) {
            border-bottom: 0;
        }

        .info-grid .label {
            background: #f5f8fb;
            color: var(--muted);
            font-weight: 600;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .empty-hint {
            padding: 22px;
            text-align: center;
            color: var(--muted);
        }

        .help-text {
            font-size: 12px;
            color: var(--muted);
        }

        @media (max-width: 1180px) {
            .metrics-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .split-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 920px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                height: auto;
            }

            .form-grid,
            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .content-wrap,
            .topbar {
                padding-left: 16px;
                padding-right: 16px;
            }
        }
    </style>
</head>
<body>
    {% set path = request.url.path %}
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-badge">FT</div>
                <div class="brand-copy">
                    <strong>平贴管理系统</strong>
                    <span>Flat IMS</span>
                </div>
            </div>

            <div class="nav-group">
                <div class="nav-label">总览</div>
                <a class="nav-link {% if path == '/' %}active{% endif %}" href="/">工作台</a>
            </div>

            <div class="nav-group">
                <div class="nav-label">主数据</div>
                <a class="nav-link {% if path.startswith('/owners') %}active{% endif %}" href="/owners/">客户信息</a>
                <a class="nav-link {% if path.startswith('/products') %}active{% endif %}" href="/products/">产品资料</a>
            </div>

            <div class="nav-group">
                <div class="nav-label">库存</div>
                <a class="nav-link {% if path == '/stock/' or path.startswith('/stock/') %}active{% endif %}" href="/stock/">库存台账</a>
                <a class="nav-link {% if path.startswith('/inbounds') %}active{% endif %}" href="/inbounds/">入库单</a>
                <a class="nav-link {% if path.startswith('/outbounds') %}active{% endif %}" href="/outbounds/">出库单</a>
            </div>

            <div class="nav-group">
                <div class="nav-label">单据</div>
                <a class="nav-link {% if path.startswith('/orders') %}active{% endif %}" href="/orders/">订单管理</a>
                <a class="nav-link {% if path.startswith('/ai') %}active{% endif %}" href="/ai/demo">AI 录单</a>
            </div>
        </aside>

        <div class="main-shell">
            <header class="topbar">
                <div class="topbar-title">
                    <h1>{% block page_heading %}平贴管理系统{% endblock %}</h1>
                    <p>{% block page_subtitle %}轻量业务流转系统，保留成熟后台的操作感。{% endblock %}</p>
                </div>
                <div class="topbar-note">本地运行中 · 平贴业务流</div>
            </header>

            <div class="content-wrap">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
