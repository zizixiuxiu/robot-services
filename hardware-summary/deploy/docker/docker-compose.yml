services:
  hardware-summary:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: hardware-summary-8001
    ports:
      - "8001:8001"
    volumes:
      - ../../src:/app/src:ro
      - ../../data/output:/app/data/output
      - ../../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_DIR=/app/logs
      - HARDWARE_MAX_WORKERS=2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
