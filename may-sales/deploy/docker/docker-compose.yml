name: may-sales

services:
  dealer-sales:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: dealer-sales-8003
    ports:
      - "8003:8003"
    volumes:
      # 代码文件挂载，便于热更新
      - ../../src/dealer_sales_http.py:/app/dealer_sales_http.py:ro
      - ../../src/generate_may_sales_report.js:/app/generate_may_sales_report.js:ro
      - ../../config/package.json:/app/package.json:ro
      # 输出目录挂载，便于调试查看
      - ../../data/output_may_sales:/app/output_may_sales
      - ../../logs:/app/logs
    environment:
      # 默认模板；如需使用本地默认模板，可挂载并设置此变量
      - DEFAULT_TEMPLATE=/app/output_may_sales/2026年5月销售部业绩核对表 - 副本.xlsx
      - OUTPUT_DIR=/app/output_may_sales
      - LOG_DIR=/app/logs
      - PYTHONUNBUFFERED=1
    working_dir: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
