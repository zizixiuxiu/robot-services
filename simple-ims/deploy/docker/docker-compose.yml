name: simple-ims

services:
  simple-ims:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: simple-ims-8090
    ports:
      - "8090:8090"
    volumes:
      - ../../src/app:/app/app:ro
      - ../../data:/app/data
      - ../../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/inventory.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
